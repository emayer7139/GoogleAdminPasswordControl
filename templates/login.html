<!DOCTYPE html>
<html lang="en" class="light-mode">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In • ResetApp</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- YOUR custom CSS -->
  <link
    rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}"
  />
</head>
<body>

  {% include 'partials/navbar.html' %}

  <div class="d-flex justify-content-center align-items-center" style="height:calc(100vh - 56px);">
    <div class="card p-5 shadow-lg text-center" style="max-width:600px; width:95%;">
      <!-- Logo -->
      <img
        src="{{ url_for('static', filename='img/logo.png') }}"
        alt="ResetApp Logo"
        class="mb-4"
        style="height:120px;"
      />

      <!-- Heading -->
      <h1 class="display-5 mb-3">Welcome Back!</h1>
      <p class="lead mb-4">
        Sign in with your Google account to reset student passwords.
      </p>

      <!-- Google button -->
      <button id="googleSignIn" class="btn google-btn w-100 py-3 fs-5">
        <img
          src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
          alt="Google Logo"
          style="height:24px;"
        />
        <span id="btnText">Sign in with Google</span>
        <div id="btnSpinner" class="spinner-border text-primary d-none" role="status"></div>
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Google‑button spinner logic
    document.getElementById('googleSignIn').onclick = () => {
      const btn = document.getElementById('googleSignIn');
      btn.disabled = true;
      document.getElementById('btnText').classList.add('d-none');
      document.getElementById('btnSpinner').classList.remove('d-none');
      window.location.href = "{{ url_for('login_google') }}";
    };
  </script>
</body>
</html>
